#docker/alertmanager/alertmanager.yml
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webapp-webhook'

receivers:
  - name: 'webapp-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:4000/api/alerts/webhook'
        send_resolved: true